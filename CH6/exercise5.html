  <script>
    let product1 = { name: "Laptop", price: 999, stock: 10 };
    let product2 = { name: "Laptop", price: 999, stock: 10 };
    function isIdenticalProduct(){
      if (product1.name == product2.name && product1.price ==product2.price && product1.stock == product2.stock) {
        return "Identical";
      } else {
        return "Not Identical";
      }
    }
    console.log(isIdenticalProduct());
  </script>
